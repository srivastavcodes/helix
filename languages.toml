# ================================================================================================================
#  RUST
# ================================================================================================================

[language-server.rust-analyzer.config]

# -- Cargo -------------------------------------------------------------------------------------------------------
cargo.buildScripts.enable = true # needed for proc-macros and build.rs
cargo.features = "all"           # index all features upfront
cargo.allTargets = true          # include tests/benches in analysis

# -- Proc macros -------------------------------------------------------------------------------------------------
procMacro.enable = true
procMacro.attributes.enable = true

# -- Diagnostics -------------------------------------------------------------------------------------------------
diagnostics.enable = true
diagnostics.styleLints.enable = true    # clippy-style lint hints
diagnostics.experimental.enable = false # too noisy for daily use

# -- Check (replaces cargo check on save) ------------------------------------------------------------------------
check.command = "clippy" # use clippy instead of plain check
# check.extraArgs = [
#   "--",
#   "-A",
#   "clippy::pedantic",
#   "-A",
#   "clippy::must_use_candidate", # too noisy
#   "-A",
#   "clippy::missing_errors_doc", # too noisy
# ]

# -- Inlay hints -------------------------------------------------------------------------------------------------
inlayHints.typeHints.enable = true
inlayHints.typeHints.hideClosureInitialization = false
inlayHints.chainingHints.enable = true
inlayHints.closureReturnTypeHints.enable = "with_block"
inlayHints.lifetimeElisionHints.enable = "skip_trivial"
inlayHints.lifetimeElisionHints.useParameterNames = true
inlayHints.discriminantHints.enable = "fieldless"
inlayHints.closingBraceHints.enable = true
inlayHints.bindingModeHints.enable = false               # noisy, keep off
inlayHints.closingBraceHints.minLines = 15

# -- Completion --------------------------------------------------------------------------------------------------
completion.autoimport.enable = true
completion.callable.enable = "fill_arguments"
completion.postfix.enable = true                # .if / .match / .unwrap completions
completion.fullFunctionSignatures.enable = true

# -- Imports -----------------------------------------------------------------------------------------------------
imports.granularity.group = "module" # group imports by module
imports.prefix = "self"              # prefer self:: over crate::

# -- Files -------------------------------------------------------------------------------------------------------
files.excludeDirs = ["target", ".git", "node_modules"]

[[language]]
name = "rust"
auto-format = true
formatter = { command = "rustfmt" }
language-servers = ["rust-analyzer"]

# ================================================================================================================
#  GO
# ================================================================================================================

[language-server.gopls.config.hints]
assignVariableTypes = true
compositeLiteralFields = true
constantValues = true
functionTypeParameters = true
parameterNames = true
rangeVariableTypes = true

[language-server.golangci-lint-lsp.config]
command = [
  "golangci-lint",
  "run",
  "--output.json.path=stdout",
  "--show-stats=false",
  "--issues-exit-code=1",
]

[language-server.golangci-lint-lsp]
command = "golangci-lint-langserver"

[[language]]
name = "go"
auto-format = true
formatter = { command = "gofmt" }
language-servers = ["gopls", "golangci-lint-lsp"]

# ================================================================================================================
#  TOML  (Cargo.toml, rust-toolchain.toml, config.toml etc.)
#  taplo = full-featured TOML LSP with schema support for Cargo.toml
# ================================================================================================================

[[language]]
name = "toml"
auto-format = true
language-servers = ["taplo"]                           # drop tombi (taplo is more mature for Cargo)
indent = { tab-width = 4, unit = "    " }              # Cargo.toml convention
formatter = { command = "taplo", args = ["fmt", "-"] }

# ================================================================================================================
#  JSON  (api responses, configs, .vscode/settings.json)
# ================================================================================================================

[[language]]
name = "json"
auto-format = true
indent = { tab-width = 4, unit = "    " }

# ================================================================================================================
#  YAML  (CI pipelines — GitHub Actions, Docker Compose, k8s manifests)
# ================================================================================================================

[[language]]
name = "yaml"
auto-format = false                         # yamlfmt can be destructive, keep manual
language-servers = ["yaml-language-server"]

# ================================================================================================================
#  MARKDOWN  (README, docs, rustdoc examples)
# ================================================================================================================

[[language]]
name = "markdown"
language-servers = [
  "marksman",
] # drop markdown-oxide and rumdl, overkill for Rust docs
soft-wrap.enable = true # wrap long lines in docs

# ================================================================================================================
#  BASH  (.env scripts, Makefiles, CI shell scripts)
# ================================================================================================================

[[language]]
name = "bash"
auto-format = false
language-servers = ["bash-language-server"]

# ================================================================================================================
#  LUA (.lua scripts, nvim configs, WezTerm configs)
# ================================================================================================================

[language-server.lua-language-server.config.Lua.hint]
enable = true
setType = true        # shows type on variable assignment
paramName = "All"     # shows parameter names on function calls
paramType = true      # shows parameter types
await = true          # shows await hints on async calls
arrayIndex = "Enable" # shows index numbers in array literals

[[language]]
name = "lua"
auto-format = true
formatter = { command = "stylua", args = ["-"] }

# ================================================================================================================
#  HTML (*.html files, *.gohtml files)
# ================================================================================================================

[[language]]
name = "html"
auto-format = true
file-types = ["html", "gohtml", "htm"]
language-servers = ["vscode-html-language-server"]
formatter = { command = "prettier", args = ["--parser", "html"] }
