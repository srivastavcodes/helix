# ~/.config/helix/themes/sonokai_custom.toml
#
# Custom Sonokai for Helix
# Mirrors sainnhe/sonokai (neovim) config — see palette section for colour map.
# Inherits all unset keys from the built-in "sonokai" theme.
#
# Install: cp sonokai_custom.toml ~/.config/helix/themes/
# Enable:  add `theme = "sonokai_custom"` to ~/.config/helix/config.toml

inherits = "sonokai"

# ══════════════════════════════════════════════════════════════════════════════
#  SYNTAX — Strings & Punctuation
# ══════════════════════════════════════════════════════════════════════════════

"markup.raw" = "green_dim"
"string" = "blue_str"                # #4C88F4  ← @string / String
"string.regexp" = "blue_str"
"punctuation.bracket" = "bracket_fg" # #C0C0C8  ← @punctuation.bracket

# ══════════════════════════════════════════════════════════════════════════════
#  SYNTAX — Types
#  Helix scopes are language-agnostic; these map to the closest equivalents of
#  the LSP semantic tokens you set per-language in nvim.
# ══════════════════════════════════════════════════════════════════════════════

"type" = "type_struct"                # #40BB99  ← @type / @lsp.type.struct
"type.parameter" = "type_struct"
"constructor" = "type_enum"
"type.enum" = "type_enum"             # #788CDA  ← @lsp.type.enum
"type.enum.variant" = "type_enum_var" # #6DA1AB  ← @lsp.type.enumMember
"namespace" = "blue"                  # #10ACCF  ← modules / namespaces
"variable.builtin" = "red"            # #FF5B51  ← builtin variables (self)
"special" = "yellow"
# "variable.other.member" = "white"

# ══════════════════════════════════════════════════════════════════════════════
#  SYNTAX — Functions & Keywords
# ══════════════════════════════════════════════════════════════════════════════

# "function"         = "fn_color"          # #FFB548  ← @lsp.type.function
# "function.method"  = "fn_color"
"function.builtin" = "fn_color"
"function.macro" = "macro_color"    # #FFBF41  ← macros
"attribute" = "macro_color"         # #FFBF41  ← proc-macro / derive attrs
"keyword.directive" = "macro_color" # #FFBF41  ← @keyword.directive (Rust #[…])

# ══════════════════════════════════════════════════════════════════════════════
#  UI — Cursor
#  sonokai_cursor = "green"
# ══════════════════════════════════════════════════════════════════════════════

"ui.cursor" = { modifiers = ["reversed"] }

"ui.cursor.primary.normal" = { fg = "bg0", bg = "green" }  # green cursor
"ui.cursor.primary.insert" = { fg = "bg0", bg = "red" }
"ui.cursor.primary.select" = { fg = "bg0", bg = "purple" }

"ui.cursor.normal" = { fg = "bg0", bg = "green" }
"ui.cursor.insert" = { fg = "bg0", bg = "red" }
"ui.cursor.select" = { fg = "bg0", bg = "purple" }

"ui.cursor.match" = { bg = "match" }

"ui.cursorline.primary" = { bg = "caret_row" }

# ══════════════════════════════════════════════════════════════════════════════
#  UI — Selection/Highlight
# ══════════════════════════════════════════════════════════════════════════════

"ui.selection" = { bg = "select" }
"ui.selection.primary" = { bg = "select" }
"ui.highlight" = { bg = "picker" }
"ui.highlight.frameline" = { bg = "picker" }

# ══════════════════════════════════════════════════════════════════════════════
#  UI — Menus & Completion (popups)
#  sonokai_menu_selection_background = "green"
# ══════════════════════════════════════════════════════════════════════════════

"ui.menu" = { fg = "fg", bg = "bg1" }
"ui.menu.selected" = { fg = "bg0", bg = "green" } # green selection

"ui.text.focus" = "green"

"ui.help" = { fg = "purple", bg = "bg0" }
"ui.popup" = { fg = "white", bg = "bg1" }
"ui.popup.info" = { fg = "purple", bg = "bg1" }
"ui.background" = { fg = "purple", bg = "bg0" }

# ══════════════════════════════════════════════════════════════════════════════
#  UI — Bufferline (mode colours mirror nvim sonokai defaults)
# ══════════════════════════════════════════════════════════════════════════════

"ui.bufferline" = { fg = "white_dim", bg = "bg_dim" }
"ui.bufferline.active" = { fg = "white", bg = "bg0" }
"ui.bufferline.background" = { fg = "white", bg = "black" }

# ══════════════════════════════════════════════════════════════════════════════
#  UI — Statusline (mode colours mirror nvim sonokai defaults)
# ══════════════════════════════════════════════════════════════════════════════

"ui.statusline" = { fg = "fg", bg = "bg1" }
"ui.statusline.inactive" = { fg = "grey", bg = "bg1" }
"ui.statusline.normal" = { fg = "bg0", bg = "green", modifiers = ["bold"] }
"ui.statusline.insert" = { fg = "bg0", bg = "red", modifiers = ["bold"] }
"ui.statusline.select" = { fg = "bg0", bg = "purple", modifiers = ["bold"] }

# ══════════════════════════════════════════════════════════════════════════════
#  DIAGNOSTICS  (sonokai_diagnostic_virtual_text = "highlighted")
# ══════════════════════════════════════════════════════════════════════════════

"diagnostic.error" = { underline = { style = "curl", color = "red" } }
"diagnostic.warning" = { underline = { style = "curl", color = "yellow" } }
"diagnostic.info" = { underline = { style = "curl", color = "green" } }
"diagnostic.hint" = { underline = { style = "curl", color = "blue" } }
"diagnostic.unnecessary" = { modifiers = ["dim"] }
"diagnostic.deprecated" = { modifiers = ["crossed_out"] }

error = { fg = "red", bg = "bg2", modifiers = ["bold"] }
warning = { fg = "yellow", bg = "bg2", modifiers = ["bold"] }
info = { fg = "green", bg = "bg2" }
hint = { fg = "blue", bg = "bg2", modifiers = ["bold"] }

# ══════════════════════════════════════════════════════════════════════════════
#  PALETTE
#
#  Backgrounds are re-derived from the user's darker bg0 (#222427).
#  Each bg step is ~6-8 hex units lighter than the previous, matching
#  the original sonokai progression but anchored to the darker base.
# ══════════════════════════════════════════════════════════════════════════════

[palette]

# ── Backgrounds ───────────────────────────────────────────────────────────────
bg_dim = "#1a1c1f" # dim bg
bg0 = "#222427"    # main bg  (nvim: bg0 override — darker than stock #2c2e34)
bg1 = "#292B30"    # cursorline, inactive statusline bg
bg2 = "#2D3038"    # popup bg
bg3 = "#32353D"    # statusline bg
bg4 = "#383C45"    # cursor match, secondary selection
bg5 = "#3C4049"    # primary selection
black = "#181819"

# ── Foreground ────────────────────────────────────────────────────────────────
fg = "#E2E2E3"

# ── Core accent colours (nvim overrides) ─────────────────────────────────────
red = "#FF5B51"       # keywords, errors         ← nvim red override
orange = "#FF8E5B"    # member fields, specials  ← nvim orange override
yellow = "#F0A737"    # numbers, tags, macros    ← nvim yellow override
green = "#9ED072"     # functions (base), ui accents (unchanged)
blue = "#10ACCF"      # namespaces, types (base) ← nvim blue override
purple = "#B39DF3"    # builtins, attributes     (unchanged)
cyan = "#8DD0B6"      # edge compat              (unchanged)
white = "#E1E1E4"
white_dim = "#999999"
grey = "#7F8490"
green_dim = "#4986B4"
grey_dim = "#595F6F"

# ── Syntax extras ─────────────────────────────────────────────────────────────
blue_str = "#4C88F4"   # strings               ← @string / String
bracket_fg = "#C0C0C8" # punctuation.bracket   ← @punctuation.bracket

# ── Type hierarchy ────────────────────────────────────────────────────────────
type_struct = "#40BB99"   # structs / concrete    ← @type.rust / @lsp.type.struct.rust
type_enum = "#788CDA"     # enum types            ← @lsp.type.enum.rust
type_enum_var = "#6DA1AB" # enum variants         ← @lsp.type.enumMember.rust
# trait/interface (#8A8FF4) has no dedicated Helix scope; closest is "namespace"
# or use a future "type.interface" if added upstream.

# ── Function & macro ─────────────────────────────────────────────────────────
fn_color = "#FFB548"    # functions             ← @lsp.type.function.rust
macro_color = "#6DA1AB" # macros / directives   ← @keyword.directive.rust / yellow

# ── Diff colours (carried from stock sonokai) ─────────────────────────────────
bg_red = "#FF6077"
bg_green = "#A7DF78"
bg_blue = "#85D3F2"
diff_red = "#55393D"
diff_green = "#394634"
diff_blue = "#354157"
diff_yellow = "#4E432F"

# -- JetBrains -------------------------------------------------------------------------------------------------
picker = "#2C364F"
select = "#26373B"
caret_row = "#26282E"
match = "#414f57"
